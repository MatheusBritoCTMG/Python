<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Web Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="calc-container">
        <h2>Calculadora Web</h2>

        {% if erro %}
            <div class="alert error">{{ erro }}</div>
        {% endif %}

       
        {% if resultado is not none %}
            <div class="alert success">
                <p class="etapa"><strong>Expressão:</strong> {{ conta }}</p>
                <p class="resultado"><strong>Resultado Final:</strong> {{ resultado }}</p>
            </div>
        {% endif %}

        <form method="POST" action="/">
            <div class="form-group">
                <label for="num1">Primeiro Número (Obrigatório):</label>
                <input type="number" step="any" name="num1" id="num1" value="{{ num1 }}" required>
            </div>

            <div class="form-group">
                <label for="operacao">Operação:</label>
                <select name="operacao" id="operacao" onchange="toggleNum2()">
                    <option value="somar" {% if operacao = 'somar' %}selected{% endif %}>Adição (+)</option>
                    <option value="subtrair" {% if operacao = 'subtrair' %}selected{% endif %}>Subtração (-)</option>
                    <option value="multiplicar" {% if operacao = 'multiplicar' %}selected{% endif %}>Multiplicação (*)</option>
                    <option value="dividir" {% if operacao = 'dividir' %}selected{% endif %}>Divisão (/)</option>
                    <option value="potencia" {% if operacao = 'potencia' %}selected{% endif %}>Potência (**)</option>
                    <option value="sqrt" {% if operacao = 'sqrt' %}selected{% endif %}>Raiz Quadrada (sqrt)</option>
                    <option value="log" {% if operacao = 'log' %}selected{% endif %}>Logaritmo (log₁₀)</option>
                </select>
            </div>

            <div class="form-group" id="group-num2">
                <label for="num2">Segundo Número:</label>
                <input type="number" step="any" name="num2" id="num2" value="{{ num2 }}">
            </div>

            <div class="button-group">
                <button type="submit">Calcular</button>
                <a href="/" class="btn-clear">Limpar</a>
            </div>
        </form>
    </div>

 
    <script>
        function toggleNum2() {
            var operacao = document.getElementById("operacao").value;
            var groupNum2 = document.getElementById("group-num2");
            var inputNum2 = document.getElementById("num2");

            if (operacao === "sqrt" || operacao === "log") {
                groupNum2.style.display = "none";
                inputNum2.required = false;
            } else {
                groupNum2.style.display = "block";
                inputNum2.required = true;
            }
        }
     
        window.onload = toggleNum2;
    </script>
</body>
</html>
